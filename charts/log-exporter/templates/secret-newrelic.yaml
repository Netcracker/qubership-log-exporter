{{ if eq "newrelic" (lower .Values.LME_DATASOURCE_TYPE) -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "log-exporter.fullname" . }}-newrelic-credentials
  labels:
    {{- $name := printf "%s-newrelic-credentials" (include "log-exporter.fullname" .) -}}
    {{- include "log-exporter.resourceLabels" (dict "ctx" . "name" $name) | nindent 4 }}
data:
  NEWRELIC_ACCOUNT_ID: {{ .Values.LME_NEWRELIC_ACCOUNT_ID | int64 | print | b64enc }}
  NEWRELIC_X_QUERY_KEY: {{ .Values.LME_NEWRELIC_X_QUERY_KEY | print | b64enc }}
{{ end -}}
